<!DOCTYPE html>
<html>
<head>
    <script type="module" src="https://cdn.jsdelivr.net/npm/zero-md@3?register"></script>
</head>
<body>
    <zero-md id="md-viewer" no-shadow></zero-md>
    <script>
      setTimeout(() => {
        const viewer = document.getElementById('md-viewer');
        viewer.innerHTML = '';
        const scriptEl = document.createElement('script');
        scriptEl.type = 'text/markdown';
        scriptEl.text = '# Hello World Reactively?';
        viewer.appendChild(scriptEl);
      }, 500);
    </script>
</body>
</html>
