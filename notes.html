      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              heading: ['"Source Serif 4"', '"Noto Serif SC"', 'Georgia', 'serif'],
              body: ['"Source Sans 3"', '"Noto Sans SC"', 'system-ui', 'sans-serif'],

            colors: {

              accent: { DEFAULT: '#b45309', soft: '#fef3c7', muted: '#92400e' },
              depth: { DEFAULT: '#155e75' },
            },
            boxShadow: {
              card: '0 1px 2px rgba(28, 25, 23, 0.04), 0 12px 40px rgba(28, 25, 23, 0.06)',
            },
          },

      };

    <style>
      :root {
        --bg-color: #f7f3ee;
        --text-color: #1c1917;
        --accent-color: #92400e;
      }
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background-color: var(--bg-color);
        background-image: radial-gradient(ellipse 100% 70% at 102% -10%, rgba(253, 230, 138, 0.35), transparent 55%), radial-gradient(ellipse 80% 55% at -8% 100%, rgba(165, 243, 252, 0.2), transparent 50%);
        color: var(--text-color);
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
        z-index: 20;
      }
      ::selection {
        background-color: var(--accent-color);
        color: white;
      }
      .tree-dir > .tree-children { display: none; }
      .tree-dir.expanded > .tree-children { display: block; }
      .tree-icon { transition: transform 0.2s; display: inline-block; }
      .tree-dir.expanded > .tree-header .tree-icon { transform: rotate(90deg); }
    </style>
  </head>
  <body class="font-body text-stone-800 antialiased selection:bg-accent selection:text-white flex min-h-screen flex-col">
    <header class="sticky top-0 z-40 w-full border-b border-stone-200/60 bg-paper/80 backdrop-blur-md">
      <div class="mx-auto flex h-16 max-w-6xl items-center justify-between px-4">
        <a href="index.html" class="inline-flex items-center gap-2 font-heading text-lg font-bold text-stone-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent focus-visible:ring-offset-2">
          <iconify-icon icon="solar:folder-favourite-bookmark-bold-duotone" class="text-xl text-amber-700"></iconify-icon>
          <span data-i18n="nav.notes">笔记仓</span>
        </a>
        <nav class="hidden items-center gap-6 text-sm outline-none font-medium text-stone-600 sm:flex">
          <a href="index.html#focus" class="cursor-pointer transition-colors duration-200 hover:text-accent" data-i18n="nav.focus">关注领域</a>
          <a href="index.html#projects" class="cursor-pointer transition-colors duration-200 hover:text-accent" data-i18n="nav.projects">项目</a>
          <a href="index.html#background" class="cursor-pointer transition-colors duration-200 hover:text-accent" data-i18n="nav.resume">简历摘要</a>
          <a href="articles.html" class="cursor-pointer transition-colors duration-200 hover:text-accent" data-i18n="nav.articles">文章列表</a>
          <a href="notes.html" class="cursor-pointer transition-colors duration-200 hover:text-accent" data-i18n="nav.notes">笔记</a>
        </nav>
      </div>
    </header>

    <main class="relative z-30 mx-auto flex w-full max-w-5xl flex-1 flex-col px-4 py-12 sm:py-20 lg:py-24">
      <div class="grid gap-5 lg:grid-cols-[minmax(0,1.2fr)_minmax(0,0.8fr)]">
        <div class="flex flex-col gap-4">
        <h1 class="font-heading text-3xl font-bold tracking-tight text-stone-900 sm:text-4xl lg:text-5xl" data-i18n="notes.page.title">
          笔记目录
        </h1>
        <p class="max-w-2xl text-base leading-relaxed text-stone-600 sm:text-lg" data-i18n="notes.page.desc">
          课件、手记都在这。
          点文件夹就展开。
        </p>
        </div>
        <a href="https://picsum.photos/seed/notes-hero/720/460" target="_blank" class="group overflow-hidden rounded-3xl border border-amber-200/80 bg-white/80 shadow-sm">
          <img src="https://picsum.photos/seed/notes-hero/720/460" alt="笔记页占位图" class="h-44 w-full object-cover transition duration-500 group-hover:scale-105" loading="lazy" />
        </a>
      </div>
      
      <div class="mt-8 rounded-2xl border border-stone-200 bg-white p-6 shadow-sm">
        <p class="mb-3 inline-flex items-center gap-2 text-xs font-medium uppercase tracking-[0.14em] text-stone-500"><iconify-icon icon="solar:notes-bold-duotone" class="text-base text-teal-700"></iconify-icon>Notebook Tree</p>
        <div id="tree-container" class="text-sm">
          <p class="text-stone-500" data-i18n="notes.page.loading">正在加载笔记目录...</p>
        </div>
      </div>
    </main>

    <footer class="mt-auto border-t border-stone-200 bg-stone-50 py-8">
      <div class="mx-auto max-w-6xl px-4 text-center">
        <p class="text-sm text-stone-500" data-i18n="notes.page.footer">
          © 2026 傅文基
        </p>
      </div>
    </footer>

    <script>
      function buildTreeHTML(node) {
        const lang = (typeof getLang === 'function') ? getLang() : 'zh';
        const emptyLabel = lang === 'en' ? 'Empty folder' : '空文件夹';

        if (node.type === 'directory') {
          let html = `<div class="tree-dir mt-1">`;
          html += `
            <div class="tree-header flex items-center cursor-pointer py-1.5 px-2 rounded hover:bg-stone-100 text-stone-800 font-medium" onclick="this.parentElement.classList.toggle('expanded')">
              <span class="tree-icon mr-2 text-stone-400">▶</span>
              <iconify-icon icon="solar:folder-with-files-bold-duotone" class="mr-2 text-lg text-amber-600"></iconify-icon>
              ${node.name}
            </div>
            <div class="tree-children border-l ml-3 pl-4 border-stone-200">
          `;
          if (node.children) {
            node.children.forEach(child => {
              html += buildTreeHTML(child);
            });
          }
          if (!node.children || node.children.length === 0) {
            html += `<div class="py-1 px-2 text-stone-400 italic text-xs">${emptyLabel}</div>`;
          }
          html += `</div></div>`;
          return html;
        } else {
          let icon = '<iconify-icon icon="solar:file-text-bold-duotone" class="mr-2 text-lg text-stone-500"></iconify-icon>';
          
          let actionUrl = '#';
          if (node.name.toLowerCase().endsWith('.md')) {
            actionUrl = `article-viewer.html?file=${encodeURIComponent(node.path)}`;
          } else if (node.name.toLowerCase().endsWith('.pdf')) {
            actionUrl = node.path;
          }

          let extClasses = "text-stone-700 hover:text-accent hover:underline";
          if (node.name.toLowerCase().endsWith('.pdf')) {
            icon = '<iconify-icon icon="solar:file-pdf-bold-duotone" class="mr-2 text-lg text-red-500"></iconify-icon>';
          }

          return `
            <div class="py-1 mt-1">
              <a href="${actionUrl}" target="${node.name.endsWith('.pdf') ? '_blank' : '_self'}" class="flex items-center px-2 py-1 rounded hover:bg-stone-50 ${extClasses}">
                <span class="w-4 h-4 mr-2 opacity-0"></span>
                ${icon}
                ${node.name}
              </a>
            </div>
          `;
        }
      }

      fetch('notes.json')
        .then(res => res.json())
        .then(data => {
          let rootHtml = `<div class="tree-dir expanded">`;
          rootHtml += `
            <div class="tree-header flex items-center cursor-pointer py-1.5 px-2 rounded hover:bg-stone-100 text-stone-800 font-bold" onclick="this.parentElement.classList.toggle('expanded')">
              <span class="tree-icon mr-2 text-stone-400">▶</span>
              <iconify-icon icon="solar:folder-cloud-bold-duotone" class="mr-2 text-xl text-teal-700"></iconify-icon>
              ${data.name}
            </div>
            <div class="tree-children border-l ml-3 pl-4 border-stone-200">
          `;
          data.children.forEach(child => {
            rootHtml += buildTreeHTML(child);
          });
          rootHtml += `</div></div>`;
          document.getElementById('tree-container').innerHTML = rootHtml;
        })
        .catch(err => {
          const lang = (typeof getLang === 'function') ? getLang() : 'zh';
          const errorLabel = lang === 'en' ? 'Load failed' : '加载失败';
          document.getElementById('tree-container').innerHTML = `<p class="text-red-500">${errorLabel}: ${err.message}</p>`;
        });
    </script>
    <!-- Enhanced modules -->
    <script src="js/i18n.js"></script>
    <script src="js/darkmode.js"></script>
    <script src="js/search.js"></script>
    <script src="js/progress.js"></script>
    <script src="js/toolbar.js"></script>
  </body>
</html>
