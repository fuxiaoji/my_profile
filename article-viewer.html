<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>文章阅读 · 傅文基</title>
    <meta name="description" content="傅文基的站内 Markdown 文章阅读页。" />
    <meta name="view-transition" content="same-origin" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Source+Sans+3:ital,wght@0,300..700;1,300..700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400..700;1,8..60,400..700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <!-- 引入 zero-md 开源 Web Component 框架 -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/zero-md@3?register"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              heading: ['"Source Serif 4"', '"Noto Serif SC"', 'Georgia', 'serif'],
              body: ['"Source Sans 3"', '"Noto Sans SC"', 'system-ui', 'sans-serif'],
            },
            colors: {
              paper: '#f7f3ee',
              accent: { DEFAULT: '#b45309', soft: '#fef3c7', muted: '#92400e' },
              depth: { DEFAULT: '#155e75' },
            },
          },
        },
      };
    </script>
    <style>
      :root { color-scheme: light; }
      body {
        font-family: 'Source Sans 3', 'Noto Sans SC', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background-color: #f7f3ee;
        background-image: radial-gradient(ellipse 100% 70% at 102% -10%, rgba(253, 230, 138, 0.35), transparent 55%), radial-gradient(ellipse 80% 55% at -8% 100%, rgba(165, 243, 252, 0.2), transparent 50%);
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
        z-index: 20;
      }
      .font-heading { font-family: 'Source Serif 4', 'Noto Serif SC', Georgia, serif; }
      #content-wrapper { min-height: 50vh; }
      
      /* 强制 Markdown 容器背景为透明和文字为深色，针对黑暗模式进行覆盖 */
      .markdown-body {
        background-color: transparent !important;
        color: #1f2328 !important;
      }
      .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4, .markdown-body h5, .markdown-body h6 {
        color: #1f2328 !important;
      }
      
      /* 左侧大纲当前高亮项样式 */
      .toc-link.active {
        color: #c2410c;
        font-weight: 600;
        border-left-color: #c2410c;
      }
    </style>
  </head>
  <body class="min-h-screen text-stone-800 antialiased">
    <div class="relative z-30 mx-auto mb-20 max-w-[1400px] px-4 pt-8 sm:pt-10">
      <header class="mb-8 flex flex-col gap-4 border-b border-stone-200 pb-6">
        <div class="flex items-center justify-between gap-3">
          <a href="index.html" class="flex shrink-0 items-center gap-3">
            <img src="photo/logo.png" class="inline-flex h-9 w-9 items-center justify-center rounded-full border border-stone-200 bg-white object-cover shadow-sm" alt="logo" />
            <span class="font-heading text-xl font-semibold text-stone-900">傅文基</span>
          </a>
          <nav class="hidden md:flex items-center gap-6 text-sm font-medium text-stone-600">
            <a href="index.html" class="transition hover:text-accent">首页</a>
            <a href="index.html#projects" class="transition hover:text-accent">项目</a>
            <a href="index.html#contact" class="transition hover:text-accent">联系</a>
            <a href="articles.html" class="transition hover:text-accent">文章列表</a>
            <a href="notes.html" class="transition hover:text-accent">笔记</a>
          </nav>
        </div>

        <div>
          <h1 id="page-title" class="mt-3 font-heading text-3xl font-semibold text-stone-900">开读</h1>
          <p id="page-subtitle" class="mt-2 text-sm text-stone-600">稍等，马上加载。</p>
        </div>
      </header>

      <main class="grid grid-cols-1 lg:grid-cols-4 xl:grid-cols-12 gap-8 items-start">
        
        <!-- 左侧大纲 -->
        <aside class="hidden lg:block lg:col-span-1 xl:col-span-3 sticky top-10 max-h-[85vh] overflow-y-auto">
          <h3 class="mb-4 border-b border-stone-100 pb-2 font-heading text-lg font-semibold text-stone-900">大纲导航</h3>
          <div class="mb-4 overflow-hidden rounded-2xl border border-stone-200 bg-white/80">
            <img src="https://picsum.photos/seed/toc-side/420/240" alt="目录配图占位" class="h-24 w-full object-cover" loading="lazy" />
          </div>
          <nav id="toc-container" class="space-y-2 border-l-2 border-stone-100 pl-4 py-2 text-sm text-stone-500">
            <!-- 动态渲染目录 -->
          </nav>
        </aside>

        <!-- 中间文章内容 -->
        <div id="content-wrapper" class="lg:col-span-2 xl:col-span-6 rounded-3xl border border-stone-200 bg-white/95 px-6 sm:px-10 py-10 shadow-sm">
          <!-- zero-md 渲染容器 -->
          <zero-md id="md-viewer" no-shadow>
            <template>
              <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-light.min.css" />
              <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/styles/github.min.css" />
              <style>
                .markdown-body {
                  background-color: transparent !important;
                }
              </style>
            </template>
          </zero-md>
          
          <div id="error" class="hidden mt-6 rounded-2xl border border-red-200 bg-red-50 px-5 py-4 text-sm text-red-700"></div>
        </div>

        <!-- 右侧推荐阅读 -->
        <aside class="hidden lg:block lg:col-span-1 xl:col-span-3 sticky top-10">
          <h3 class="mb-4 border-b border-stone-100 pb-2 font-heading text-lg font-semibold text-stone-900">顺手读点</h3>
          <div class="mb-4 rounded-2xl border border-stone-200 bg-white/85 p-3 text-xs text-stone-600">
            <p class="flex items-center gap-2 text-stone-800"><iconify-icon icon="solar:eye-bold-duotone" class="text-base text-amber-700"></iconify-icon>同主题推荐</p>
            <p class="mt-1">看 3 篇就够。</p>
          </div>
          <ul id="similar-list" class="space-y-4 text-sm">
            <!-- 动态渲染推荐列表 -->
          </ul>
        </aside>
      </main>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const fileParam = params.get('file');
      const file = fileParam ? decodeURIComponent(fileParam) : null;
      
      const mdViewer = document.getElementById('md-viewer');
      const errorEl = document.getElementById('error');
      const titleEl = document.getElementById('page-title');
      const subtitleEl = document.getElementById('page-subtitle');
      const contentWrapper = document.getElementById('content-wrapper');

      function showError(message) {
        contentWrapper.classList.add('hidden');
        errorEl.classList.remove('hidden');
        errorEl.textContent = message;
        subtitleEl.textContent = '没加载出来。';
      }

      function generateTOC() {
        const headings = mdViewer.querySelectorAll('h1, h2, h3, h4');
        const tocContainer = document.getElementById('toc-container');
        if (!headings.length) {
          tocContainer.innerHTML = '<p class="text-stone-400">这篇没有小标题</p>';
          return;
        }

        tocContainer.innerHTML = '';
        headings.forEach((heading, index) => {
          if (!heading.id) {
            heading.id = 'heading-' + index;
          }
          
          const level = parseInt(heading.tagName.charAt(1));
          // 基于标题层级进行缩进，h1 不缩进，h2 缩进 1 级，以此类推
          const indent = Math.max(0, level - 1) * 1;
          
          const a = document.createElement('a');
          a.href = '#' + heading.id;
          a.className = `block truncate transition-colors duration-200 hover:text-accent toc-link py-1 border-l-2 -ml-[2px] border-transparent`;
          a.style.paddingLeft = `${indent + 0.5}rem`;
          a.textContent = heading.textContent;
          tocContainer.appendChild(a);
        });

        // 简易滚动监听，高亮当前视口内的章节
        const observer = new IntersectionObserver((entries) => {
          let visibleHeadingId = null;
          entries.forEach(entry => {
            if (entry.isIntersecting) visibleHeadingId = entry.target.id;
          });
          if (visibleHeadingId) {
            document.querySelectorAll('.toc-link').forEach(link => {
              if (link.getAttribute('href') === '#' + visibleHeadingId) {
                link.classList.add('active', 'text-accent', 'font-semibold', 'border-accent');
                link.classList.remove('text-stone-500', 'border-transparent');
              } else {
                link.classList.remove('active', 'text-accent', 'font-semibold', 'border-accent');
                link.classList.add('text-stone-500', 'border-transparent');
              }
            });
          }
        }, { rootMargin: '-10% 0px -80% 0px' });
        headings.forEach(h => observer.observe(h));
      }

      function generateSimilarArticles(currentTitle) {
        const similarList = document.getElementById('similar-list');
        
        fetch('articles.json')
          .then(res => res.json())
          .then(articles => {
            const currentArticle = articles.find(a => a.title === currentTitle);
            const currentTags = currentArticle ? (currentArticle.tags || []) : [];
            
            // Calculate similarity score based on tag intersection
            const scoredArticles = articles
              .filter(a => a.title !== currentTitle)
              .map(a => {
                const aTags = a.tags || [];
                const commonTags = aTags.filter(t => currentTags.includes(t));
                return { ...a, score: commonTags.length };
              })
              // Sort by score descending, then by date or title
              .sort((a, b) => b.score - a.score || b.title.localeCompare(a.title));
            
            const topArticles = scoredArticles.slice(0, 3);
            
            similarList.innerHTML = '';
            topArticles.forEach(article => {
              const href = `article-viewer.html?file=${encodeURIComponent(article.md)}`;
              const cover = article.cover || 'https://picsum.photos/seed/placeholder/460/260';
              const sum = article.summary || '暂无摘要';
              
              const li = document.createElement('li');
              li.className = 'group overflow-hidden rounded-2xl border border-stone-100 bg-white p-0 transition-all hover:border-stone-300 hover:shadow-sm';
              li.innerHTML = `
                <a href="${href}" class="block">
                  <img src="${cover}" alt="${article.title} 占位图" class="h-24 w-full object-cover" loading="lazy" />
                  <div class="p-4">
                    <h4 class="font-heading text-base font-semibold text-stone-900 group-hover:text-accent transition-colors">${article.title}</h4>
                    <p class="mt-2 text-xs text-stone-500 line-clamp-2 leading-relaxed">${sum}</p>
                    <p class="mt-2 inline-flex items-center gap-1 text-xs font-medium text-amber-700"><iconify-icon icon="solar:arrow-right-up-bold-duotone" class="text-base"></iconify-icon>继续读</p>
                  </div>
                </a>
              `;
              similarList.appendChild(li);
            });
          })
          .catch(err => {
            console.error('Failed to load similar articles', err);
            similarList.innerHTML = '<p class="text-xs text-stone-500">暂无推荐推荐</p>';
          });
      }

      if (!file || (!file.endsWith('.md') && !file.endsWith('.MD'))) {
        showError('地址不对，请重进。');
      } else {
        // 从 file 路径中提取文章标题
        const expectedTitle = file.split('/').pop().replace(/\.md$/i, '');
        
        fetch(file)
          .then((response) => {
            if (!response.ok) throw new Error('无法读取文章文件');
            return response.text();
          })
          .then((content) => {
            const title = expectedTitle;
            titleEl.textContent = title;
            subtitleEl.textContent = '文件：' + file;
            document.title = `${title} · 傅文基`;

            // 处理 Obsidian 图片语法 `![[]]`
            let normalized = content.replaceAll('![[', '![](').replaceAll(']]', ')');

            // 解决 blob url 导致图片相对路径失效的问题
            const rootUrl = window.location.origin + window.location.pathname.replace('article-viewer.html', '');
            normalized = normalized.replace(/!\[(.*?)\]\((?!http|data:)(.*?)\)/g, (match, alt, src) => {
              // 补充绝对路径
              let finalSrc = src;
              if (src.startsWith('/')) {
                finalSrc = src.substring(1);
              }
              return `![${alt}](${rootUrl}${finalSrc})`;
            });

            // 写入 zero-md
            const blob = new Blob([normalized], { type: 'text/markdown' });
            const blobUrl = URL.createObjectURL(blob);
            mdViewer.setAttribute('src', blobUrl);
            
            // 监听 zero-md 渲染完成，生成右侧相似文章及左侧目录
            mdViewer.addEventListener('zero-md-rendered', () => {
              generateTOC();
              generateSimilarArticles(title);
            }, { once: true });
          })
          .catch((err) => {
            showError('加载失败：' + err.message);
          });
      }
    </script>
  </body>
</html>
