<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>贴吧爬虫 - 百度贴吧一键导出Markdown工具 · 傅文基</title>
    <meta name="description" content="在线百度贴吧爬虫工具，支持一键抓取帖子内容、楼中楼回复及图片，并支持导出和下载为 Markdown 格式。完全免费的贴吧只看楼主导出工具。" />
    <meta name="keywords" content="贴吧爬虫, 百度贴吧爬虫, 贴吧导出, 贴吧备份, 贴吧转Markdown, 爬虫工具, 傅文基" />
    <meta name="view-transition" content="same-origin" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Source+Sans+3:ital,wght@0,300..700;1,300..700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400..700;1,8..60,400..700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              heading: ['"Source Serif 4"', '"Noto Serif SC"', 'Georgia', 'serif'],
              body: ['"Source Sans 3"', '"Noto Sans SC"', 'system-ui', 'sans-serif'],
            },
            colors: {
              paper: '#f7f3ee',
              accent: { DEFAULT: '#b45309', soft: '#fef3c7', muted: '#92400e' },
              depth: { DEFAULT: '#155e75' },
            },
            boxShadow: {
              card: '0 1px 2px rgba(28, 25, 23, 0.04), 0 12px 40px rgba(28, 25, 23, 0.06)',
            },
          },
        },
      };
    </script>
    <style>
      :root { color-scheme: light; }
      body {
        font-family: 'Source Sans 3', 'Noto Sans SC', system-ui, sans-serif;
        background-color: #f7f3ee;
      }
      .font-heading { font-family: 'Source Serif 4', 'Noto Serif SC', Georgia, serif; }
      .markdown-body img { max-width: 100%; border-radius: 0.5rem; }
    </style>
  </head>
  <body class="min-h-screen text-stone-800 antialiased">
    <div class="relative z-30 mx-auto max-w-7xl px-4 pb-20 pt-8 sm:pt-10">
      <header class="flex flex-col gap-4 border-b border-stone-200 pb-6">
        <div class="flex flex-wrap items-center justify-between gap-3">
          <a href="index.html" class="flex shrink-0 items-center gap-3">
            <img src="photo/logo.png" class="inline-flex h-9 w-9 items-center justify-center rounded-full border border-stone-200 bg-white object-cover shadow-sm" alt="logo" />
            <span class="font-heading text-lg font-semibold text-stone-900">傅文基</span>
          </a>
          <nav class="flex flex-wrap items-center gap-4 text-sm font-medium text-stone-600">
            <a href="index.html" class="transition-colors duration-200 hover:text-accent">首页</a>
            <a href="index.html#projects" class="transition-colors duration-200 hover:text-accent">项目</a>
            <a href="tieba-spider.html" class="text-stone-900">贴吧爬虫</a>
            <a href="articles.html" class="transition-colors duration-200 hover:text-accent">文章列表</a>
          </nav>
        </div>

        <div class="mt-3">
          <h1 class="font-heading text-3xl font-semibold text-stone-900 sm:text-4xl">在线贴吧爬虫核心引擎</h1>
          <p class="mt-2 text-sm text-stone-600">输入帖子链接，一键抓取并导出为图文并茂的 Markdown 文档。</p>
        </div>
      </header>

      <main class="mt-8 grid gap-8 lg:grid-cols-[1fr_2fr]">
        <!-- 左侧：表单配置区 -->
        <div class="flex flex-col gap-6">
          <div class="rounded-2xl border border-stone-200 bg-white p-6 shadow-sm">
            <form id="spider-form" class="space-y-5">
              <div>
                <label class="block text-sm font-medium text-stone-700">帖子完整链接</label>
                <input type="url" id="tieba-url" required class="mt-1 w-full rounded-lg border border-stone-300 px-4 py-2 text-sm focus:border-accent focus:ring-1 focus:ring-accent" placeholder="https://tieba.baidu.com/p/..." />
              </div>
              
              <div class="flex flex-col gap-3">
                <label class="flex items-center gap-2 text-sm text-stone-700 cursor-pointer">
                  <input type="checkbox" id="opt-subcomments" class="rounded text-accent focus:ring-accent" checked>
                  包含楼中楼回复
                </label>
                <label class="flex items-center gap-2 text-sm text-stone-700 cursor-pointer">
                  <input type="checkbox" id="opt-images" class="rounded text-accent focus:ring-accent" checked>
                  包含帖子图片
                </label>
              </div>

              <button type="submit" id="submit-btn" class="w-full flex items-center justify-center gap-2 rounded-xl bg-accent px-4 py-2.5 text-sm font-medium text-white transition-all hover:bg-amber-800">
                <iconify-icon icon="solar:spider-bold-duotone" class="text-lg"></iconify-icon> 抓取并预览
              </button>
            </form>

            <div id="status-msg" class="mt-4 text-xs text-red-600 hidden"></div>
          </div>
          
          <div class="rounded-2xl border border-stone-200 bg-stone-50 p-4">
            <h3 class="text-sm font-semibold text-stone-800 mb-3">操作面板</h3>
            <button id="copy-btn" class="mb-2 w-full flex items-center justify-center gap-2 rounded-lg border border-stone-300 bg-white px-3 py-2 text-sm font-medium text-stone-700 hover:bg-stone-50 disabled:opacity-50" disabled>
              <iconify-icon icon="solar:copy-bold-duotone"></iconify-icon> 复制代码
            </button>
            <button id="download-btn" class="w-full flex items-center justify-center gap-2 rounded-lg border border-stone-300 bg-white px-3 py-2 text-sm font-medium text-stone-700 hover:bg-stone-50 disabled:opacity-50" disabled>
              <iconify-icon icon="solar:download-square-bold-duotone"></iconify-icon> 下载 MD 文件
            </button>
          </div>
        </div>

        <!-- 右侧：双栏预览区 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 h-[600px]">
          <div class="flex flex-col rounded-2xl border border-stone-200 bg-white overflow-hidden">
            <div class="border-b border-stone-100 bg-stone-50 px-4 py-2 text-xs font-semibold text-stone-500">Markdown 源码</div>
            <textarea id="md-source" class="flex-1 w-full resize-none p-4 text-xs font-mono text-stone-700 focus:outline-none" readonly placeholder="等待抓取结果..."></textarea>
          </div>
          <div class="flex flex-col rounded-2xl border border-stone-200 bg-white overflow-hidden">
            <div class="border-b border-stone-100 bg-stone-50 px-4 py-2 text-xs font-semibold text-stone-500">渲染预览</div>
            <div id="md-preview" class="prose prose-sm prose-stone flex-1 p-4 overflow-y-auto w-full max-w-none"><p class="text-stone-400">暂无预览内容</p></div>
          </div>
        </div>
      </main>
    </div>

    <script>
      const form = document.getElementById('spider-form');
      const submitBtn = document.getElementById('submit-btn');
      const statusMsg = document.getElementById('status-msg');
      const mdSource = document.getElementById('md-source');
      const mdPreview = document.getElementById('md-preview');
      const copyBtn = document.getElementById('copy-btn');
      const downloadBtn = document.getElementById('download-btn');
      
      let currentMarkdown = '';

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const url = document.getElementById('tieba-url').value;
        const incSub = document.getElementById('opt-subcomments').checked;
        const incImg = document.getElementById('opt-images').checked;
        
        statusMsg.classList.add('hidden');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<iconify-icon icon="solar:hourglass-bold-duotone" class="text-lg animate-spin"></iconify-icon> 抓取中...';
        
        try {
          // 注意：此处发送了文档未提及的额外参数，后端需要做相应升级来支持
          const response = await fetch('/spider-api/run', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url, include_sub_comments: incSub, include_images: incImg })
          });
          
          if (!response.headers.get('content-type')?.includes('application/json')) {
              throw new Error('服务器返回的不是JSON格式，可能是Nginx配置错误导致返回了404/502页面。');
          }
          
          const data = await response.json();
          if(data.code === 200) {
            // 修正图片路径，使用绝对URL指向服务器存储位置
            let rawMarkdown = data.markdown_content || `> ${data.msg}\n\n**提示：** 当前后端接口未返回实际的 \`markdown_content\`，您需补充后端爬取逻辑以返回文章文本。`;
            if (data.folder_name) {
              const imgPrefix = `/spider-api/output/${encodeURIComponent(data.folder_name)}/images/`;
              rawMarkdown = rawMarkdown.replace(/\]\(images\//g, `](${imgPrefix}`);
            }
            
            currentMarkdown = rawMarkdown;
            mdSource.value = currentMarkdown;
            mdPreview.innerHTML = marked.parse(currentMarkdown);
            
            copyBtn.disabled = false;
            downloadBtn.disabled = false;
          } else {
            throw new Error(data.msg || '抓取失败');
          }
        } catch (err) {
          statusMsg.textContent = `请求异常：${err.message}`;
          statusMsg.classList.remove('hidden');
        } finally {
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<iconify-icon icon="solar:spider-bold-duotone" class="text-lg"></iconify-icon> 抓取并预览';
        }
      });

      copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(currentMarkdown).then(() => {
          const originalHTML = copyBtn.innerHTML;
          copyBtn.innerHTML = '<iconify-icon icon="solar:check-circle-bold-duotone"></iconify-icon> 已复制';
          setTimeout(() => copyBtn.innerHTML = originalHTML, 2000);
        });
      });

      downloadBtn.addEventListener('click', () => {
        const blob = new Blob([currentMarkdown], { type: 'text/markdown' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = '贴吧抓取导出.md';
        a.click();
      });
    </script>
  </body>
</html>
