          );
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
        z-index: 20;
      }

        font-family: 'Source Serif 4', 'Noto Serif SC', Georgia, serif;
      }

        background: #92400e;

  <body class="content-shell min-h-screen text-stone-800 antialiased">

      <header class="content-reveal content-glass flex flex-col gap-5 rounded-[2rem] p-4 sm:p-6" data-stagger>
        <div class="content-nav flex flex-wrap items-center justify-between gap-3 rounded-full px-4 py-3">
          <a href="index.html" class="flex shrink-0 items-center gap-3">
            <img src="photo/logo.png" class="inline-flex h-9 w-9 items-center justify-center rounded-full border border-stone-200 bg-white object-cover shadow-sm" alt="logo" />
            <span class="font-heading text-lg font-semibold text-stone-900">傅文基</span>
          </a>
          <nav class="flex flex-wrap items-center gap-4 text-sm font-medium text-stone-600">
            <a href="index.html" class="transition-colors duration-200 hover:text-accent" data-i18n="nav.home">首页</a>
            <a href="index.html#projects" class="transition-colors duration-200 hover:text-accent" data-i18n="nav.projects">项目</a>
            <a href="index.html#contact" class="transition-colors duration-200 hover:text-accent" data-i18n="nav.contact">联系</a>
            <a href="articles.html" class="text-stone-900" data-i18n="nav.articles">文章列表</a>
            <a href="notes.html" class="transition-colors duration-200 hover:text-accent" data-i18n="nav.notes">笔记</a>
          </nav>
        </div>

        <div class="grid gap-5 lg:grid-cols-[minmax(0,1.25fr)_minmax(0,0.75fr)]">
        <div class="space-y-3">
          <a
            href="index.html"
            class="inline-flex items-center gap-2 text-sm font-medium text-stone-600 transition-colors duration-200 hover:text-accent"
            data-i18n="articles.page.back"
          >
            ← 返回首页
          </a>
          <div>
            <p class="content-eyebrow text-xs font-medium uppercase text-stone-500">
              Articles · Markdown Library
            </p>
            <h1 class="font-heading text-4xl font-semibold text-stone-900 sm:text-5xl" data-i18n="articles.page.title">
              文章列表
            </h1>
            <p class="mt-2 max-w-2xl text-sm leading-relaxed text-stone-600" data-i18n="articles.page.desc">
              这页是文章仓库。点开就能读。
            </p>
          </div>
        </div>
        <div class="grid gap-3">
          <a href="https://picsum.photos/seed/fuwenji-article-hero/740/440" target="_blank" class="group overflow-hidden rounded-[1.6rem] border border-white/70 bg-white/45 shadow-sm">
            <img src="https://picsum.photos/seed/fuwenji-article-hero/740/440" alt="文章封面占位图" class="h-40 w-full object-cover transition duration-500 group-hover:scale-105" loading="lazy" />
          </a>
          <div class="reader-side-card rounded-[1.35rem] px-4 py-3 text-sm text-stone-600">
            <p class="flex items-center gap-2 font-medium text-stone-800"><iconify-icon icon="solar:book-2-bold-duotone" class="text-base text-amber-700"></iconify-icon><span id="article-count">当前共 — 篇</span></p>
            <p class="mt-1 flex items-center gap-2"><iconify-icon icon="solar:bolt-circle-bold-duotone" class="text-base text-teal-700"></iconify-icon>金融 / Web3 / AI / 政经</p>
          </div>
        </div>
        </div>
      </header>

      <main class="mt-10 space-y-10">
        <section class="content-reveal space-y-5" data-stagger>
          <div class="flex items-center justify-between gap-4">
            <h2 class="font-heading text-2xl font-semibold text-stone-900" data-i18n="articles.page.all">全部文章</h2>
            <a
              href="文章/"
              class="inline-flex items-center gap-1 text-xs font-medium text-accent underline-offset-4 transition-colors duration-200 hover:underline"
            >
              <iconify-icon icon="solar:folder-open-bold-duotone" class="text-base"></iconify-icon>
              <span data-i18n="articles.page.viewdir">查看原始目录</span>
            </a>
          </div>

          <div id="tag-filters" class="filter-rail flex flex-wrap gap-2 rounded-[1.35rem] p-2"></div>
          <div id="articles-grid" class="articles-bento-grid"></div>
          <p id="empty-hint" class="hidden text-sm text-stone-500" data-i18n="articles.page.empty">该标签下暂时没有文章。</p>
        </section>
      </main>
    </div>
    <script>
      let articles = [];

      fetch('articles.json')
        .then(res => res.json())
        .then(data => {
          articles = data
            .slice()
            .sort((a, b) => new Date(b.date).getTime() - new Date(a.date).getTime());
          // 动态更新文章计数
          const lang = (typeof getLang === 'function') ? getLang() : 'zh';
          const countEl = document.getElementById('article-count');
          if (countEl) {
            countEl.textContent = lang === 'en' ? `${articles.length} articles total` : `当前共 ${articles.length} 篇`;
          }
          const allTagLabel = (typeof t === 'function') ? t('articles.page.tag.all') : '全部';
          const tags = [allTagLabel, ...new Set(articles.flatMap(a => a.tags))];
          allTags.splice(0, allTags.length, ...tags);
          activeTag = allTagLabel;
          renderFilters();
          renderArticles();
        });

      const tagFilters = document.getElementById('tag-filters');
      const grid = document.getElementById('articles-grid');
      const emptyHint = document.getElementById('empty-hint');
      const allTags = ['全部'];
      let activeTag = '全部';

      function renderFilters() {
        tagFilters.innerHTML = allTags
          .map((tag) => {
            const active = tag === activeTag ? 'tag-chip-active' : '';
            const pressed = tag === activeTag ? 'true' : 'false';
            return `<button data-tag="${tag}" aria-pressed="${pressed}" class="tag-filter-btn rounded-full px-3.5 py-2 text-xs font-semibold ${active}">${tag}</button>`;
          })
          .join('');
      }

      function animateArticleGrid() {
        const cards = grid.querySelectorAll('[data-article-card]');
        cards.forEach((card, index) => {
          card.style.opacity = '0';
          card.style.transform = 'translateY(14px)';
          window.setTimeout(() => {
            card.style.opacity = '1';
            card.style.transform = 'translateY(0)';
          }, 35 * index);
        });
      }

      function getArticleVariant(index) {
        const variants = [
          'article-card--feature',
          'article-card--wide',
          'article-card--compact',
          'article-card--compact',
          'article-card--text',
          'article-card--tall',
          'article-card--compact',
          'article-card--wide',
          'article-card--compact',
          'article-card--text'
        ];
        return variants[index % variants.length];
      }

      function renderArticles() {
        const allTagLabel = allTags[0]; // first tag is always "All"
        const list =
          activeTag === allTagLabel
            ? articles
            : articles.filter((a) => a.tags.includes(activeTag));

        emptyHint.classList.toggle('hidden', list.length > 0);

        const lang = (typeof getLang === 'function') ? getLang() : 'zh';
        const readLabel = lang === 'en' ? 'Read Now' : '现在去读';
        const docxLabel = lang === 'en' ? 'Download DOCX' : '下载 DOCX';
        const noDocxLabel = lang === 'en' ? 'No DOCX' : '无 DOCX';

        grid.innerHTML = list
          .map((a, index) => {
            const tagHtml = a.tags
              .map(
                (t) =>
                  `<span class="article-tag rounded-full px-2.5 py-1 text-[11px] font-medium">#${t}</span>`
              )
              .join('');
            const docxBtn = a.docx
              ? `<a href="${a.docx}" download class="rounded-full border border-sky-200/70 bg-sky-50/70 px-3 py-1 text-xs font-medium text-sky-700 transition-colors hover:border-sky-300 hover:bg-sky-100/80">${docxLabel}</a>`
              : `<span class="rounded-full border border-stone-200/80 bg-white/50 px-3 py-1 text-xs text-stone-400">${noDocxLabel}</span>`;

            const variant = getArticleVariant(index);
            const isCompact = variant === 'article-card--compact';
            const titleSize = variant === 'article-card--feature'
              ? 'text-2xl sm:text-3xl'
              : (variant === 'article-card--compact' ? 'text-base' : 'text-xl');

            return `<article data-article-card class="article-card ${variant} transition-all duration-300">
              <a href="article-viewer.html?file=${encodeURIComponent(a.md)}" class="absolute inset-0 z-[2]" aria-label="${a.title}"></a>
              <img src="${a.cover}" alt="${a.title}" class="article-card-cover" loading="lazy" />
              <div class="article-card-shade"></div>
              <div class="article-card-body">
              <div class="mb-2 flex items-start justify-between gap-3">
                <p class="article-card-meta inline-flex items-center gap-1 rounded-full border border-white/20 bg-black/20 px-2.5 py-1 text-xs text-white/75 backdrop-blur-md"><iconify-icon icon="solar:calendar-bold-duotone" class="text-base text-cyan-200"></iconify-icon>${a.date}</p>
                <span class="article-docx relative z-[4]">${docxBtn}</span>
              </div>
              <h3 class="article-card-title font-heading ${titleSize} font-semibold">${a.title}</h3>
              <p class="article-card-summary mt-2 text-sm leading-relaxed">${a.summary}</p>
              <div class="article-card-tags mt-3 flex flex-wrap gap-2">${tagHtml}</div>
              ${isCompact ? '' : `<span class="mt-4 inline-flex w-fit items-center gap-1 rounded-full bg-white/18 px-3 py-1.5 text-xs font-semibold text-white backdrop-blur-md"><iconify-icon icon="solar:arrow-right-up-bold-duotone" class="text-base"></iconify-icon>${readLabel}</span>`}
              </div>
            </article>`;
          })
          .join('');
        animateArticleGrid();
      }

      tagFilters.addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-tag]');
        if (!btn) return;
        activeTag = btn.dataset.tag;
        renderFilters();
        grid.style.opacity = '0.35';
        grid.style.transform = 'translateY(6px)';
        window.setTimeout(() => {
          renderArticles();
          grid.style.opacity = '1';
          grid.style.transform = 'translateY(0)';
        }, 120);
      });

      // Re-render on language change
      window.addEventListener('langchange', () => {
        const lang = (typeof getLang === 'function') ? getLang() : 'zh';
        const countEl = document.getElementById('article-count');
        if (countEl && articles.length) {
          countEl.textContent = lang === 'en' ? `${articles.length} articles total` : `当前共 ${articles.length} 篇`;
        }
        const allTagLabel = (typeof t === 'function') ? t('articles.page.tag.all') : '全部';
        allTags[0] = allTagLabel;
        if (activeTag === '全部' || activeTag === 'All') activeTag = allTagLabel;
        renderFilters();
        renderArticles();
      });

      renderFilters();
      renderArticles();
    </script>

    <script src="js/search.js"></script>
