<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>文章列表 · 傅文基</title>
    <meta
      name="description"
      content="傅文基的文章列表页，集中展示金融、Web3、AI 与政经观察类 Markdown 文章。"
    />
    <meta name="view-transition" content="same-origin" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Source+Sans+3:ital,wght@0,300..700;1,300..700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400..700;1,8..60,400..700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              heading: ['"Source Serif 4"', '"Noto Serif SC"', 'Georgia', 'serif'],
              body: ['"Source Sans 3"', '"Noto Sans SC"', 'system-ui', 'sans-serif'],
            },
            colors: {
              paper: '#f7f3ee',
              accent: { DEFAULT: '#b45309', soft: '#fef3c7', muted: '#92400e' },
              depth: { DEFAULT: '#155e75' },
            },
            boxShadow: {
              card: '0 1px 2px rgba(28, 25, 23, 0.04), 0 12px 40px rgba(28, 25, 23, 0.06)',
            },
          },
        },
      };
    </script>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        font-family: 'Source Sans 3', 'Noto Sans SC', system-ui, -apple-system,
          BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background-color: #f7f3ee;
        background-image: radial-gradient(
            ellipse 95% 70% at 102% -10%,
            rgba(254, 215, 170, 0.42),
            transparent 55%
          ),
          radial-gradient(
            ellipse 75% 55% at -4% 100%,
            rgba(190, 242, 100, 0.2),
            transparent 50%
          );
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
        z-index: 20;
      }
      .font-heading {
        font-family: 'Source Serif 4', 'Noto Serif SC', Georgia, serif;
      }
      .tag-chip-active {
        background: #92400e;
        color: #fff;
        border-color: #92400e;
      }
    </style>
  </head>
  <body class="min-h-screen text-stone-800 antialiased">
    <div class="relative z-30 mx-auto max-w-6xl px-4 pb-20 pt-8 sm:pt-10">
      <header class="flex flex-col gap-4 border-b border-stone-200 pb-6">
        <div class="flex flex-wrap items-center justify-between gap-3">
          <a href="index.html" class="flex shrink-0 items-center gap-3">
            <img src="photo/logo.png" class="inline-flex h-9 w-9 items-center justify-center rounded-full border border-stone-200 bg-white object-cover shadow-sm" alt="logo" />
            <span class="font-heading text-lg font-semibold text-stone-900">傅文基</span>
          </a>
          <nav class="flex flex-wrap items-center gap-4 text-sm font-medium text-stone-600">
            <a href="index.html" class="transition-colors duration-200 hover:text-accent">首页</a>
            <a href="index.html#projects" class="transition-colors duration-200 hover:text-accent">项目</a>
            <a href="index.html#contact" class="transition-colors duration-200 hover:text-accent">联系</a>
                              <a href="articles.html" class="text-stone-900">文章列表</a>
                  <a href="notes.html" class="transition-colors duration-200 hover:text-accent">笔记</a>
          </nav>
        </div>

        <div class="mt-3 grid gap-4 lg:grid-cols-[minmax(0,1.3fr)_minmax(0,0.7fr)]">
        <div class="space-y-3">
          <a
            href="index.html"
            class="inline-flex items-center gap-2 text-sm font-medium text-stone-600 transition-colors duration-200 hover:text-accent"
          >
            <span aria-hidden="true">←</span>
            返回首页
          </a>
          <div>
            <p class="text-xs font-medium uppercase tracking-[0.16em] text-stone-500">
              Articles · Markdown Library
            </p>
            <h1 class="font-heading text-3xl font-semibold text-stone-900 sm:text-4xl">
              文章列表
            </h1>
            <p class="mt-2 max-w-2xl text-sm leading-relaxed text-stone-600">
              这页是文章仓库。点开就能读。
              都在 <code class="rounded bg-stone-100 px-1.5 py-0.5 text-xs text-stone-700">文章/</code>。
            </p>
          </div>
        </div>
        <div class="grid gap-3">
          <a href="https://picsum.photos/seed/fuwenji-article-hero/740/440" target="_blank" class="group overflow-hidden rounded-3xl border border-amber-200/80 bg-white/80 shadow-sm">
            <img src="https://picsum.photos/seed/fuwenji-article-hero/740/440" alt="文章封面占位图" class="h-36 w-full object-cover transition duration-500 group-hover:scale-105" loading="lazy" />
          </a>
          <div class="rounded-3xl border border-stone-200 bg-white/85 px-4 py-3 text-sm text-stone-600 shadow-sm">
            <p class="flex items-center gap-2 font-medium text-stone-800"><iconify-icon icon="solar:book-2-bold-duotone" class="text-base text-amber-700"></iconify-icon>当前共 5 篇</p>
            <p class="mt-1 flex items-center gap-2"><iconify-icon icon="solar:bolt-circle-bold-duotone" class="text-base text-teal-700"></iconify-icon>金融 / Web3 / AI / 政经</p>
          </div>
        </div>
        </div>
      </header>

      <main class="mt-10 space-y-10">
        <section class="space-y-4">
          <div class="flex items-center justify-between gap-4">
            <h2 class="font-heading text-2xl font-semibold text-stone-900">全部文章</h2>
            <a
              href="文章/"
              class="inline-flex items-center gap-1 text-xs font-medium text-accent underline-offset-4 transition-colors duration-200 hover:underline"
            >
              <iconify-icon icon="solar:folder-open-bold-duotone" class="text-base"></iconify-icon>
              查看原始目录
            </a>
          </div>

          <div id="tag-filters" class="flex flex-wrap gap-2"></div>
          <div id="articles-grid" class="grid gap-4 md:grid-cols-2"></div>
          <p id="empty-hint" class="hidden text-sm text-stone-500">该标签下暂时没有文章。</p>
          </div>
        </section>
      </main>
    </div>
    <script>
      let articles = [];

      fetch('articles.json')
        .then(res => res.json())
        .then(data => {
          articles = data;
          const tags = ['全部', ...new Set(articles.flatMap(a => a.tags))];
          allTags.splice(0, allTags.length, ...tags);
          renderFilters();
          renderArticles();
        });

      const tagFilters = document.getElementById('tag-filters');
      const grid = document.getElementById('articles-grid');
      const emptyHint = document.getElementById('empty-hint');
      const allTags = ['全部', ...new Set(articles.flatMap((a) => a.tags))];
      let activeTag = '全部';

      function renderFilters() {
        tagFilters.innerHTML = allTags
          .map((tag) => {
            const active = tag === activeTag ? 'tag-chip-active' : '';
            return `<button data-tag="${tag}" class="rounded-full border border-stone-300 bg-white px-3 py-1.5 text-xs font-medium text-stone-700 transition-colors hover:border-accent/40 hover:text-accent ${active}">${tag}</button>`;
          })
          .join('');
      }

      function renderArticles() {
        const list =
          activeTag === '全部'
            ? articles
            : articles.filter((a) => a.tags.includes(activeTag));

        emptyHint.classList.toggle('hidden', list.length > 0);

        grid.innerHTML = list
          .map((a) => {
            const tagHtml = a.tags
              .map(
                (t) =>
                  `<span class="rounded-full bg-stone-100 px-2 py-1 text-[11px] text-stone-600">#${t}</span>`
              )
              .join('');
            const docxBtn = a.docx
              ? `<a href="${a.docx}" download class="rounded-full border border-stone-300 px-3 py-1 text-xs text-stone-700 transition-colors hover:border-accent/40 hover:text-accent">下载 DOCX</a>`
              : `<span class="rounded-full border border-stone-200 px-3 py-1 text-xs text-stone-400">无 DOCX</span>`;

            return `<article class="overflow-hidden rounded-3xl border border-stone-200 bg-white/95 shadow-sm transition duration-300 hover:-translate-y-0.5 hover:shadow-lg">
              <img src="${a.cover}" alt="${a.title} 占位封面" class="h-40 w-full object-cover" loading="lazy" />
              <div class="p-5">
              <div class="flex items-start justify-between gap-3">
                <p class="inline-flex items-center gap-1 text-xs text-stone-500"><iconify-icon icon="solar:calendar-bold-duotone" class="text-base text-amber-700"></iconify-icon>${a.date}</p>
                ${docxBtn}
              </div>
              <h3 class="mt-3 font-heading text-xl font-semibold text-stone-900">${a.title}</h3>
              <p class="mt-3 text-sm leading-relaxed text-stone-600">${a.summary}</p>
              <div class="mt-4 flex flex-wrap gap-2">${tagHtml}</div>
              <a href="article-viewer.html?file=${encodeURIComponent(a.md)}" class="mt-5 inline-flex items-center gap-1 text-sm font-medium text-accent underline-offset-4 hover:underline"><iconify-icon icon="solar:arrow-right-up-bold-duotone" class="text-base"></iconify-icon>现在去读</a>
              </div>
            </article>`;
          })
          .join('');
      }

      tagFilters.addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-tag]');
        if (!btn) return;
        activeTag = btn.dataset.tag;
        renderFilters();
        renderArticles();
      });

      renderFilters();
      renderArticles();
    </script>
  </body>
</html>
